<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日祝福</title>
    <link rel="stylesheet" href="Yl.css">
</head>
<body>
    <!-- 烟花画布层 -->
    <canvas class="fireworks-canvas" id="fireworksCanvas"></canvas>

    <!-- 半透明悬浮卡片 -->
    <div class="Yl">
        <h2 class="sub-title">送给我的伊茹</h2>
        <p class="bless-text">
           做好准备了吗 
        </p>
        <p class="sign">——LJ</p>
        <a href="Yl3.html" target="_blank" class="jump-btn">
            点击打开礼物
        </a>
    </div>

    <audio autoplay loop volume="1">
        <source src="Yl.mp3" type="audio/mpeg">
    

    <!-- 内嵌烟花JS，不用新建文件 -->
    <script>
        const canvas = document.getElementById("fireworksCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const particles = [];
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8};
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.size = Math.random() * 3 + 2;
            }
            update() {
                this.velocity.y += 0.05;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        function createFirework(x, y) {
            const colors = ["#ff4d4d","#ffdd4d","#4dff88","#4da6ff","#ff4dc4","#ffffff"];
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 80; i++) particles.push(new Particle(x, y, color));
        }

        function animate() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 烟花持续5秒
        const duration = 5000;
        const startTime = Date.now();
        function autoFirework() {
            const elapsed = Date.now() - startTime;
            if (elapsed < duration) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height * 0.6;
                createFirework(x, y);
                setTimeout(autoFirework, Math.random() * 300 + 200);
            } else {
                canvas.style.transition = "opacity 1s ease";
                canvas.style.opacity = "0";
                setTimeout(() => canvas.remove(), 1000);
            }
        }
        autoFirework();
    </script>
</body>
</html>
